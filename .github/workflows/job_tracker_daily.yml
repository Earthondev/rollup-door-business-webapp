name: Job Tracker Daily

on:
  schedule:
    # 08:30 Asia/Bangkok = 01:30 UTC
    - cron: "30 1 * * *"
  workflow_dispatch:

concurrency:
  group: job-tracker-daily
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-daily-pipeline:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Bangkok
      GOOGLE_CLIENT_SECRETS_JSON: ${{ secrets.GOOGLE_CLIENT_SECRETS_JSON }}
      GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare OAuth credentials
        run: |
          mkdir -p credentials logs tmp
          printf '%s' "$GOOGLE_CLIENT_SECRETS_JSON" > credentials/client_secrets.json
          printf '%s' "$GOOGLE_TOKEN_JSON" > credentials/job_tracker_token.json
          python - <<'PY'
          import json
          from pathlib import Path

          cfg = Path("config/job_tracker.yaml")
          if not cfg.exists():
              raise SystemExit("Missing config/job_tracker.yaml")

          for p in (
              Path("credentials/client_secrets.json"),
              Path("credentials/job_tracker_token.json"),
          ):
              try:
                  json.loads(p.read_text(encoding="utf-8"))
              except Exception as exc:
                  raise SystemExit(f"Invalid JSON in {p}: {exc}")
          PY

      - name: Run daily pipeline
        run: python scripts/pipeline_daily.py

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-tracker-logs-${{ github.run_id }}
          path: logs/
          if-no-files-found: ignore
